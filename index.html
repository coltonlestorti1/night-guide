<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENDZ Nightlife Map</title>
    <meta name="description" content="Discover tonight's hot spots near you — ENDZ Nightlife Map." />
    <meta name="author" content="ENDZ" />
    <link rel="canonical" href="/" />

    <!-- Favicon (ENDZ "E" mark) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- theme-color must match manifest theme_color and the dark brand (#09090b) -->
    <meta name="theme-color" content="#09090b" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- dark app: solid black iOS status bar (not "default"/white) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="ENDZ" />

    <meta property="og:title" content="ENDZ — East Village Nightlife" />
    <meta property="og:description" content="The live map for where the night's actually happening. Launching soon." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://night-guide.vercel.app/" />
    <meta property="og:image" content="https://night-guide.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ENDZ — East Village Nightlife" />
    <meta name="twitter:description" content="The live map for where the night's actually happening. Launching soon." />
    <meta name="twitter:image" content="https://night-guide.vercel.app/og-image.png" />
  </head>

</html>
